[workspace]
authors = ["Mark <399551+mwiebe@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "sfmtool"
platforms = ["win-64", "linux-64"]
version = "0.2"

[dependencies]
python = ">=3.14.4,<3.15"
rust = ">=1.94.0,<1.95"
pycolmap = ">=4.0.3,<5"

[pypi-dependencies]
sfmtool = { path = ".", editable = true }

[tasks]
gui = "cargo run --release -p sfm-explorer --bin sfm-explorer"
ui-test = "cargo test -p sfm-explorer --test ui_basic -- --test-threads=1"

[feature.test.dependencies]
cargo-llvm-cov = ">=0.8.5,<0.9"

[feature.test.pypi-dependencies]
maturin = ">=1.13.1, <2"
pip = ">=26.0.1, <27"
pytest = ">=9.0.3, <10"
pytest-cov = ">=7.1.0, <8"
ruff = ">=0.15.10, <0.16"

[feature.test.activation.env]
# Force UTF-8 stdio on Windows so histogram block characters (▁..█) and other
# non-ASCII output survive cp1252. Matters under pytest's tee-sys capture
# (which routes prints through Python's text streams) and applies to any
# test-env command — `pixi run test`, `pixi run coverage-all`, the coverage
# shell script, etc.
PYTHONIOENCODING = "utf-8"

[feature.test.tasks]
test = "pytest"
test-rust = "cargo llvm-cov --workspace --exclude sfmtool-py --exclude sfm-explorer"
coverage = "cargo llvm-cov --workspace --lcov --output-path lcov.info"
coverage-all = "bash scripts/coverage.sh"
coverage-html = "cargo llvm-cov --workspace --html --open"
maturin = "maturin"
fmt = "ruff format src tests"
check = "ruff check src tests"

[feature.dev.tasks]
ipython = "ipython"

[feature.docs.pypi-dependencies]
zensical = ">=0.0.43, <0.0.44"

[feature.docs.tasks]
docs-serve = "zensical serve"
docs-build = "zensical build"

[feature.cuda.dependencies]
pycolmap = { version = ">=4.0.3,<5", build = "cuda*" }

[feature.cuda.system-requirements]
cuda = "12.9"

[environments]
default = {solve-group = "default"}
cuda = {features = ["cuda"], solve-group = "cuda"}
test = {features = ["test"], solve-group = "default"}
dev = {features = ["dev"], solve-group = "default"}
docs = {features = ["docs"], solve-group = "default"}
