[workspace]
authors = ["Mark <399551+mwiebe@users.noreply.github.com>"]
channels = ["conda-forge"]
name = "sfmtool"
platforms = ["win-64", "linux-64", "osx-arm64"]
version = "0.2"

# Universal build dependency: the Rust toolchain is needed to build any crate in
# the workspace (clippy, the sfm-explorer GUI tests, the PyO3 extension).
[dependencies]
rust = ">=1.94.0,<1.95"

# The SfM runtime: the Python interpreter and the pycolmap solver. Only
# environments that actually run the Python tool pull this in — keeping it out
# of the base deps lets the `lint` and `ui` environments skip the heavy
# pycolmap/Qt/CUDA/opencv closure.
[feature.runtime.dependencies]
python = ">=3.14.4,<3.15"
pycolmap = ">=4.0.3,<5"

# The editable sfmtool self-install compiles the PyO3 extension via maturin at
# `pixi install` time. It lives in its own feature so CI can build a runtime
# environment *without* it (`test-ci`) and compile the extension exactly once,
# explicitly, via `maturin develop --release` — instead of building it twice
# (once at install, once in the explicit step). Every local environment still
# includes it so imports work straight out of `pixi install`.
[feature.editable.pypi-dependencies]
sfmtool = { path = ".", editable = true }

[tasks]
gui = "cargo run --release -p sfm-explorer --bin sfm-explorer"
ui-test = "cargo test -p sfm-explorer --test ui_basic -- --test-threads=1"

# Linting: ruff plus a Python interpreter. clippy doesn't link libpython, but the
# PyO3 build script for sfmtool-py needs an interpreter at compile time.
[feature.lint.dependencies]
python = ">=3.14.4,<3.15"

[feature.lint.pypi-dependencies]
ruff = ">=0.15.10, <0.16"

[feature.lint.tasks]
fmt = "ruff format src tests"
check = "ruff check src tests"

[feature.test.dependencies]
cargo-llvm-cov = ">=0.8.5,<0.9"

[feature.test.pypi-dependencies]
maturin = ">=1.13.1, <2"
pip = ">=26.0.1, <27"
pytest = ">=9.0.3, <10"
pytest-cov = ">=7.1.0, <8"

[feature.test.activation.env]
# Force UTF-8 stdio on Windows so histogram block characters (▁..█) and other
# non-ASCII output survive cp1252. Matters under pytest's tee-sys capture
# (which routes prints through Python's text streams) and applies to any
# test-env command — `pixi run test`, `pixi run coverage-all`, the coverage
# shell script, etc.
PYTHONIOENCODING = "utf-8"

[feature.test.tasks]
test = "pytest"
test-rust = "cargo llvm-cov --workspace --exclude sfmtool-py --exclude sfm-explorer"
coverage = "cargo llvm-cov --workspace --lcov --output-path lcov.info"
coverage-all = "bash scripts/coverage.sh"
coverage-html = "cargo llvm-cov --workspace --html --open"
maturin = "maturin"
bench-sift = "python scripts/benchmark_sift.py"

[feature.dev.tasks]
ipython = "ipython"

[feature.docs.pypi-dependencies]
zensical = ">=0.0.43, <0.0.44"

[feature.docs.tasks]
docs-serve = "zensical serve"
docs-build = "zensical build"

# CUDA-enabled pycolmap is only published for Linux and Windows, so restrict the
# cuda feature (and any environment that uses it) to those platforms — otherwise
# the lock solve fails for osx-arm64, which has no CUDA builds.
[feature.cuda]
platforms = ["win-64", "linux-64"]

[feature.cuda.dependencies]
pycolmap = { version = ">=4.0.3,<5", build = "cuda*" }

[feature.cuda.system-requirements]
cuda = "12.9"

[environments]
default = { features = ["runtime", "editable"], solve-group = "default" }
lint = { features = ["lint"], solve-group = "default" }
ui = { solve-group = "default" }
test = { features = ["runtime", "editable", "lint", "test"], solve-group = "default" }
# Same packages as `test` but without the editable self-install, so `pixi
# install` does no Rust build. CI installs this and compiles the extension
# explicitly with `maturin develop --release` (test-os) / coverage.sh (test-linux).
test-ci = { features = ["runtime", "lint", "test"], solve-group = "default" }
dev = { features = ["runtime", "editable", "dev"], solve-group = "default" }
docs = { features = ["runtime", "editable", "docs"], solve-group = "default" }
cuda = { features = ["runtime", "editable", "cuda"], solve-group = "cuda" }
