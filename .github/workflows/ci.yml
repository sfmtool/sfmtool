name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  # Incremental compilation only pays off across edit/rebuild cycles on a warm
  # tree; in CI each job compiles roughly once, so the large target/**/incremental
  # dirs are pure overhead that bloat the Rust cache (and slow its save/restore,
  # painfully so on Windows). Disable it everywhere and drop those dirs from the
  # cache below.
  CARGO_INCREMENTAL: "0"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'test-data/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'pyproject.toml'
              - 'pixi.toml'
              - 'pixi.lock'
              - 'codecov.yml'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: lint
          cache: true
      - name: Cache cargo home
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # Registry index + downloads and git checkouts are fully determined by
          # Cargo.lock, so key on it alone (no run_id): the save is skipped on an
          # unchanged lockfile — no per-run resave of this bulk — and refreshed
          # only when dependencies change. Shared across all same-OS jobs.
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-home-
      - name: Restore Rust target
        uses: actions/cache/restore@v5
        with:
          path: |
            target
            !target/**/incremental/**
          # The exact key never matches (run_id), so restore always falls back via
          # restore-keys to the latest cache — which is only ever written on main
          # (see the Save step). Caches are branch-scoped: a main-saved cache is
          # the one every PR can read, so PRs restore a warm target for free.
          key: ${{ runner.os }}-cargo-lint-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-target-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-lint-target-

      - name: Ruff format
        run: pixi run -e lint ruff format --check src tests

      - name: Ruff lint
        run: pixi run -e lint check

      - name: Cargo fmt
        run: pixi run -e lint cargo fmt --all -- --check

      - name: Cargo clippy
        run: pixi run -e lint cargo clippy --workspace --all-targets -- -D warnings

      - name: Save Rust target
        # Save only on main: branch scoping means PR-written caches help nobody
        # else, so PR runs skip the save entirely (and dodge the slow Windows
        # compression). run_id keeps the key unique so each main push refreshes
        # the cache instead of freezing on an already-existing key.
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@v5
        with:
          path: |
            target
            !target/**/incremental/**
          key: ${{ runner.os }}-cargo-lint-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}

  # Full instrumented build + combined Rust/Python coverage, uploaded to
  # codecov. Coverage line numbers are platform-independent, so we only pay
  # the slower instrumented build once, on Linux. Windows and macOS still run
  # the same tests (see test-os) without instrumentation.
  test-linux:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # The `test-ci` env install does no Rust build (unlike `test`, it omits the
      # editable sfmtool); coverage.sh compiles the extension once via
      # `maturin develop --release`. Restore the cache first so that build is
      # incremental instead of a cold ~6 min compile.
      - name: Cache cargo home
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # Registry index + downloads and git checkouts are fully determined by
          # Cargo.lock, so key on it alone (no run_id): the save is skipped on an
          # unchanged lockfile — no per-run resave of this bulk — and refreshed
          # only when dependencies change. Shared across all same-OS jobs.
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-home-
      - name: Restore Rust target
        uses: actions/cache/restore@v5
        with:
          path: |
            target
            !target/**/incremental/**
          # The exact key never matches (run_id), so restore always falls back via
          # restore-keys to the latest cache — which is only ever written on main
          # (see the Save step). Caches are branch-scoped: a main-saved cache is
          # the one every PR can read, so PRs restore a warm target for free.
          key: ${{ runner.os }}-cargo-coverage-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-target-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-coverage-target-
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: test-ci
          cache: true

      - name: Run tests with combined coverage
        run: pixi run -e test-ci coverage-all
        shell: bash

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info,python-lcov.info
          flags: ubuntu-latest

      - name: Save Rust target
        # Save only on main: branch scoping means PR-written caches help nobody
        # else, so PR runs skip the save entirely (and dodge the slow Windows
        # compression). run_id keeps the key unique so each main push refreshes
        # the cache instead of freezing on an already-existing key.
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@v5
        with:
          path: |
            target
            !target/**/incremental/**
          key: ${{ runner.os }}-cargo-coverage-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}

  # Non-Linux correctness check: runs the same Rust + Python suites as the
  # coverage job, but without LLVM coverage instrumentation (much faster to
  # build) since coverage line numbers are platform-independent and Linux
  # already produces them. macos-latest runners are Apple Silicon (arm64),
  # matching the osx-arm64 pixi platform.
  test-os:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # The `test-ci` env install does no Rust build (unlike `test`, it omits the
      # editable sfmtool); the extension is compiled once by the explicit
      # `maturin develop --release` step below. Restore the cache first so that
      # build is incremental instead of a cold compile. The key is namespaced by
      # runner.os, so each matrix OS keeps its own cache.
      - name: Cache cargo home
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # Registry index + downloads and git checkouts are fully determined by
          # Cargo.lock, so key on it alone (no run_id): the save is skipped on an
          # unchanged lockfile — no per-run resave of this bulk — and refreshed
          # only when dependencies change. Shared across all same-OS jobs.
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-home-
      - name: Restore Rust target
        uses: actions/cache/restore@v5
        with:
          path: |
            target
            !target/**/incremental/**
          # The exact key never matches (run_id), so restore always falls back via
          # restore-keys to the latest cache — which is only ever written on main
          # (see the Save step). Caches are branch-scoped: a main-saved cache is
          # the one every PR can read, so PRs restore a warm target for free.
          key: ${{ runner.os }}-cargo-test-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-target-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-test-target-
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: test-ci
          cache: true

      - name: Build Python extension
        # --release: the debug-built PyO3 extension runs the Rust SIFT/flow
        # kernels ~10-15x slower, which both inflates test time and makes any
        # timing comparison (e.g. sfmtool vs COLMAP) meaningless. Tests exercise
        # the same optimized build that ships.
        run: pixi run -e test-ci maturin develop --release

      - name: Rust tests
        run: pixi run -e test-ci cargo test --workspace --exclude sfm-explorer

      - name: Python tests
        run: pixi run -e test-ci pytest

      - name: Save Rust target
        # Save only on main: branch scoping means PR-written caches help nobody
        # else, so PR runs skip the save entirely (and dodge the slow Windows
        # compression). run_id keeps the key unique so each main push refreshes
        # the cache instead of freezing on an already-existing key.
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@v5
        with:
          path: |
            target
            !target/**/incremental/**
          key: ${{ runner.os }}-cargo-test-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}

  ui-test-windows:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: ui
          cache: true
      - name: Cache cargo home
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # Registry index + downloads and git checkouts are fully determined by
          # Cargo.lock, so key on it alone (no run_id): the save is skipped on an
          # unchanged lockfile — no per-run resave of this bulk — and refreshed
          # only when dependencies change. Shared across all same-OS jobs.
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-home-
      - name: Restore Rust target
        uses: actions/cache/restore@v5
        with:
          path: |
            target
            !target/**/incremental/**
          # The exact key never matches (run_id), so restore always falls back via
          # restore-keys to the latest cache — which is only ever written on main
          # (see the Save step). Caches are branch-scoped: a main-saved cache is
          # the one every PR can read, so PRs restore a warm target for free.
          key: ${{ runner.os }}-cargo-ui-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-ui-target-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-ui-target-

      - name: UI tests
        run: pixi run -e ui ui-test

      - name: Save Rust target
        # Save only on main: branch scoping means PR-written caches help nobody
        # else, so PR runs skip the save entirely (and dodge the slow Windows
        # compression). run_id keeps the key unique so each main push refreshes
        # the cache instead of freezing on an already-existing key.
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@v5
        with:
          path: |
            target
            !target/**/incremental/**
          key: ${{ runner.os }}-cargo-ui-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}

  # macOS accessibility UI tests. Same xa11y-driven suite as the
  # ui-test-windows job, but macOS gates the AX API behind a TCC grant
  # (kTCCServiceAccessibility) that must target the *exact* on-disk binary.
  # The cargo test binary's path is content-hashed, so we build it first,
  # resolve that path, grant TCC to it, then execute it directly — running it
  # back through `cargo test` could rebuild and move the hash out from under
  # the grant.
  ui-test-macos:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: ui
          cache: true
      - name: Cache cargo home
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          # Registry index + downloads and git checkouts are fully determined by
          # Cargo.lock, so key on it alone (no run_id): the save is skipped on an
          # unchanged lockfile — no per-run resave of this bulk — and refreshed
          # only when dependencies change. Shared across all same-OS jobs.
          key: ${{ runner.os }}-cargo-home-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-home-
      - name: Restore Rust target
        uses: actions/cache/restore@v5
        with:
          path: |
            target
            !target/**/incremental/**
          # The exact key never matches (run_id), so restore always falls back via
          # restore-keys to the latest cache — which is only ever written on main
          # (see the Save step). Caches are branch-scoped: a main-saved cache is
          # the one every PR can read, so PRs restore a warm target for free.
          key: ${{ runner.os }}-cargo-ui-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-cargo-ui-target-${{ hashFiles('Cargo.lock') }}-
            ${{ runner.os }}-cargo-ui-target-

      # Compile the test binary (and the sfm-explorer bin it launches) without
      # running, then resolve the test binary's hashed path from cargo's JSON
      # stream. `fromjson?` skips any non-JSON lines pixi may interleave.
      - name: Build UI test binary
        id: build
        run: |
          set -euo pipefail
          bin=$(pixi run -e ui cargo test -p sfm-explorer --test ui_basic --no-run --message-format=json \
            | jq -rR 'fromjson? | select(.reason == "compiler-artifact" and .target.name == "ui_basic") | .executable // empty' \
            | tail -n1)
          test -x "$bin"
          echo "Resolved UI test binary: $bin"
          echo "bin=$bin" >> "$GITHUB_OUTPUT"

      # Grant the Accessibility (TCC) permission to that exact binary so it can
      # read sfm-explorer's accessibility tree via AXUIElement.
      - name: Grant accessibility permission
        uses: xa11y/setup-a11y@v1
        with:
          macos-tcc-client: ${{ steps.build.outputs.bin }}

      - name: UI tests
        run: "${{ steps.build.outputs.bin }} --test-threads=1"

      - name: Save Rust target
        # Save only on main: branch scoping means PR-written caches help nobody
        # else, so PR runs skip the save entirely. run_id keeps the key unique so
        # each main push refreshes the cache instead of freezing on an
        # already-existing key.
        if: ${{ always() && github.ref == 'refs/heads/main' }}
        uses: actions/cache/save@v5
        with:
          path: |
            target
            !target/**/incremental/**
          key: ${{ runner.os }}-cargo-ui-target-${{ hashFiles('Cargo.lock') }}-${{ github.run_id }}

  # Single stable check to mark as required in branch protection. Always runs
  # and reports a status, so docs-only PRs (which skip lint/test) aren't blocked.
  ci-ok:
    needs: [changes, lint, test-linux, test-os, ui-test-windows, ui-test-macos]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "CI passed"
