name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'test-data/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'pyproject.toml'
              - 'pixi.toml'
              - 'pixi.lock'
              - 'codecov.yml'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: test

      - name: Ruff format
        run: pixi run -e test ruff format --check src tests

      - name: Ruff lint
        run: pixi run -e test check

      - name: Cargo fmt
        run: pixi run -e test cargo fmt --all -- --check

      - name: Cargo clippy
        run: pixi run -e test cargo clippy --workspace --all-targets -- -D warnings

  test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: test

      - name: Run tests with combined coverage
        run: pixi run -e test coverage-all
        shell: bash

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info,python-lcov.info
          flags: ${{ matrix.os }}

  ui-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: default

      - name: UI tests
        run: pixi run ui-test

  # Single stable check to mark as required in branch protection. Always runs
  # and reports a status, so docs-only PRs (which skip lint/test) aren't blocked.
  ci-ok:
    needs: [changes, lint, test, ui-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "CI passed"
