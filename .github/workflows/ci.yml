name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            code:
              - 'src/**'
              - 'crates/**'
              - 'tests/**'
              - 'test-data/**'
              - 'scripts/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'pyproject.toml'
              - 'pixi.toml'
              - 'pixi.lock'
              - 'codecov.yml'
              - '.github/workflows/ci.yml'

  lint:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: lint
          cache: true
      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-lint-

      - name: Ruff format
        run: pixi run -e lint ruff format --check src tests

      - name: Ruff lint
        run: pixi run -e lint check

      - name: Cargo fmt
        run: pixi run -e lint cargo fmt --all -- --check

      - name: Cargo clippy
        run: pixi run -e lint cargo clippy --workspace --all-targets -- -D warnings

  # Full instrumented build + combined Rust/Python coverage, uploaded to
  # codecov. Coverage line numbers are platform-independent, so we only pay
  # the slower instrumented build once, on Linux. Windows and macOS still run
  # the same tests (see test-os) without instrumentation.
  test-linux:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # Restore the Rust cache before setup-pixi: installing the `test` env
      # compiles the editable sfmtool PyO3 extension via maturin, so a warm
      # target makes that build incremental instead of a cold ~6 min compile.
      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-coverage-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-coverage-
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: test
          cache: true

      - name: Run tests with combined coverage
        run: pixi run -e test coverage-all
        shell: bash

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info,python-lcov.info
          flags: ubuntu-latest

  # Non-Linux correctness check: runs the same Rust + Python suites as the
  # coverage job, but without LLVM coverage instrumentation (much faster to
  # build) since coverage line numbers are platform-independent and Linux
  # already produces them. macos-latest runners are Apple Silicon (arm64),
  # matching the osx-arm64 pixi platform.
  test-os:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      # Restore the Rust cache before setup-pixi: installing the `test` env
      # compiles the editable sfmtool PyO3 extension via maturin, so a warm
      # target makes that build incremental instead of a cold compile. The key
      # is namespaced by runner.os, so each matrix OS keeps its own cache.
      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: test
          cache: true

      - name: Build Python extension
        run: pixi run -e test maturin develop

      - name: Rust tests
        run: pixi run -e test cargo test --workspace --exclude sfm-explorer

      - name: Python tests
        run: pixi run -e test pytest

  ui-test:
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: ui
          cache: true
      - name: Cache Rust build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-ui-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ui-

      - name: UI tests
        run: pixi run -e ui ui-test

  # Single stable check to mark as required in branch protection. Always runs
  # and reports a status, so docs-only PRs (which skip lint/test) aren't blocked.
  ci-ok:
    needs: [changes, lint, test-linux, test-os, ui-test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed or was cancelled
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
      - run: echo "CI passed"
