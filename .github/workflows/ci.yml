name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: test

      - name: Ruff format
        run: pixi run -e test ruff format --check src tests

      - name: Ruff lint
        run: pixi run -e test check

      - name: Cargo fmt
        run: pixi run -e test cargo fmt --all -- --check

      - name: Cargo clippy
        run: pixi run -e test cargo clippy --workspace --all-targets -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: test

      - name: Run tests with combined coverage
        run: pixi run -e test coverage-all
        shell: bash

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info,python-lcov.info
          flags: ${{ matrix.os }}
