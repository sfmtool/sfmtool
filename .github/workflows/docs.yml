name: Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pixi.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'pixi.toml'
      - '.github/workflows/docs.yml'

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs-build:
    runs-on: ubuntu-latest
    # Per-ref group so PR pushes supersede their own previous runs and main
    # never gets cancelled. The global "pages" group lives on docs-deploy
    # only, where GitHub Pages actually requires it.
    concurrency:
      group: docs-build-${{ github.ref }}
      cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}
    steps:
      - uses: actions/checkout@v6
      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          environments: docs
      - run: pixi run -e docs docs-build
      - uses: actions/upload-pages-artifact@v5
        if: github.ref == 'refs/heads/main'
        with:
          path: site

  docs-deploy:
    if: github.ref == 'refs/heads/main'
    needs: docs-build
    runs-on: ubuntu-latest
    # GitHub Pages serialises deploys through a single global group; required
    # by actions/deploy-pages.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v5
        id: deployment
